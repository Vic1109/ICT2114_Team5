<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Alert Viewer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .alert-row { cursor: pointer; }
        .alert-row:hover { background-color: #f8f9fa; }
        .selected-row { background-color: #d1ecf1 !important; }
        .severity-critical { color: #dc3545; font-weight: bold; }
        .severity-high { color: #fd7e14; font-weight: bold; }
        .severity-medium { color: #ffc107; }
        .severity-low { color: #6c757d; }
    </style>
</head>
<body>
    <div class="container-fluid mt-4">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <div>
                <h2>🚨 Live Alert Viewer</h2>
                <small class="text-muted" id="cacheStatus"></small>
            </div>
            <div>
                <div class="form-check form-switch d-inline-block me-3">
                    <input class="form-check-input" type="checkbox" id="autoRefreshToggle" checked onchange="toggleAutoRefresh()">
                    <label class="form-check-label" for="autoRefreshToggle">
                        Auto-refresh (<span id="refreshInterval">15</span>s)
                    </label>
                </div>
                <button class="btn btn-primary me-2" onclick="refreshAlerts()">
                    <i class="bi bi-arrow-clockwise"></i> Refresh Now
                </button>
                <button class="btn btn-success" onclick="analyzeSelected()" id="analyzeBtn" disabled>
                    <i class="bi bi-graph-up"></i> Analyze Selected (<span id="selectedCount">0</span>)
                </button>
            </div>
        </div>

        <div id="alertsContainer">
            <div class="text-center">
                <div class="spinner-border" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    let allAlerts = [];
    let selectedAlertUuids = new Set();
        let currentPage = 1;
        let pageSize = 10;
        let totalPages = 1;
        let totalAlerts = 0;
        let minSeverity = 0;
        
        let autoRefreshInterval = null;
        let autoRefreshEnabled = true;
        let refreshIntervalSeconds = 15;
        let redirectCheckInterval = null;

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, char => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#39;'
            }[char]));
        }

        async function refreshAlerts(page = 1) {
            try {
                const container = document.getElementById('alertsContainer');
                container.innerHTML = '<div class="text-center"><div class="spinner-border" role="status"><span class="visually-hidden">Loading...</span></div><p class="mt-2">Loading alerts...</p></div>';
                
                const url = `/api/live-alerts?page=${page}&page_size=${pageSize}&min_severity=${minSeverity}`;
                
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 401) {
                        throw new Error('Authentication required. Please log in again.');
                    }
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                
                
                if (!data.success) {
                    throw new Error(data.message || 'API returned unsuccessful response');
                }
                
                currentPage = data.page;
                totalPages = data.total_pages;
                totalAlerts = data.total_alerts;
                allAlerts = data.alerts; 
                
                
                const cacheStatus = document.getElementById('cacheStatus');
                cacheStatus.textContent = `LIVE - Updated at ${new Date().toLocaleTimeString()}`;
                cacheStatus.className = 'text-success';
                
                renderAlertsTable(allAlerts);
                renderPagination();
            } catch (error) {
                console.error('Error fetching alerts:', error);
                const container = document.getElementById('alertsContainer');
                container.innerHTML = `
                    <div class="alert alert-danger">
                        <h5> Error Loading Alerts</h5>
                        <p>${escapeHtml(error.message)}</p>
                        <button class="btn btn-primary btn-sm" onclick="refreshAlerts()">Try Again</button>
                    </div>
                `;
                const cacheStatus = document.getElementById('cacheStatus');
                cacheStatus.textContent = '❌ Failed to load';
                cacheStatus.className = 'text-danger';
            }
        }

        function renderPagination() {
            const container = document.getElementById('alertsContainer');
            let paginationHtml = `
                <nav aria-label="Alert pagination" class="mt-3">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <div>
                            <span class="text-muted">
                                Showing ${allAlerts.length} of ${totalAlerts} alerts
                                (Page ${currentPage} of ${totalPages})
                            </span>
                        </div>
                        <div>
                            <label class="me-2">Min Severity:</label>
                            <select onchange="changeSeverityFilter(this.value)" class="form-select form-select-sm d-inline-block w-auto">
                                <option value="0" ${minSeverity === 0 ? 'selected' : ''}>All</option>
                                <option value="5" ${minSeverity === 5 ? 'selected' : ''}>Medium+ (5+)</option>
                                <option value="8" ${minSeverity === 8 ? 'selected' : ''}>High+ (8+)</option>
                                <option value="12" ${minSeverity === 12 ? 'selected' : ''}>Critical (12+)</option>
                            </select>
                        </div>
                    </div>
                    <ul class="pagination">
                        <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                            <a class="page-link" href="#" onclick="event.preventDefault(); refreshAlerts(1)">First</a>
                        </li>
                        <li class="page-item ${currentPage === 1 ? 'disabled' : ''}">
                            <a class="page-link" href="#" onclick="event.preventDefault(); refreshAlerts(${currentPage - 1})">Previous</a>
                        </li>
            `;
            
            const startPage = Math.max(1, currentPage - 2);
            const endPage = Math.min(totalPages, currentPage + 2);
            
            for (let i = startPage; i <= endPage; i++) {
                paginationHtml += `
                    <li class="page-item ${i === currentPage ? 'active' : ''}">
                        <a class="page-link" href="#" onclick="event.preventDefault(); refreshAlerts(${i})">${i}</a>
                    </li>
                `;
            }
            
            paginationHtml += `
                        <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                            <a class="page-link" href="#" onclick="event.preventDefault(); refreshAlerts(${currentPage + 1})">Next</a>
                        </li>
                        <li class="page-item ${currentPage === totalPages ? 'disabled' : ''}">
                            <a class="page-link" href="#" onclick="event.preventDefault(); refreshAlerts(${totalPages})">Last</a>
                        </li>
                    </ul>
                </nav>
            `;
            
            container.innerHTML += paginationHtml;
        }

        function changeSeverityFilter(newMinSeverity) {
            minSeverity = parseInt(newMinSeverity);
            currentPage = 1;
            selectedAlertUuids.clear();
            updateSelectionUI();
            refreshAlerts(1);
        }

        function toggleAutoRefresh() {
            const toggle = document.getElementById('autoRefreshToggle');
            autoRefreshEnabled = toggle.checked;
            
            if (autoRefreshEnabled) {
                startAutoRefresh();
            } else {
                stopAutoRefresh();
            }
        }
        
        function startAutoRefresh() {
            stopAutoRefresh(); // Clear any existing interval
            autoRefreshInterval = setInterval(() => {
                refreshAlerts(currentPage); // Refresh current page
            }, refreshIntervalSeconds * 1000);
        }
        
        function stopAutoRefresh() {
            if (autoRefreshInterval) {
                clearInterval(autoRefreshInterval);
                autoRefreshInterval = null;
            }
        }

        function renderAlertsTable(alerts) {
            const container = document.getElementById('alertsContainer');
            
            if (alerts.length === 0) {
                container.innerHTML = '<div class="alert alert-info">No alerts found</div>';
                return;
            }

            let html = `
                <div class="mb-3">
                    <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                    <label for="selectAll" class="ms-2"><strong>Select All (${alerts.length} alerts)</strong></label>
                </div>
                <div class="table-responsive">
                    <table class="table table-hover table-sm">
                        <thead>
                            <tr>
                                <th>Select</th>
                                <th>Timestamp</th>
                                <th>Severity</th>
                                <th>Rule Description</th>
                                <th>Source IP</th>
                                <th>Dest IP</th>
                                <th>Direction</th>
                                <th>Agent</th>
                            </tr>
                        </thead>
                        <tbody>
            `;

            alerts.forEach(alert => {
                const severity = getSeverityLevel(alert.rule_level);
                const severityClass = `severity-${severity.toLowerCase()}`;
                const isSelected = selectedAlertUuids.has(alert.alert_uuid);
                
                const timestamp = alert.timestamp ? new Date(alert.timestamp).toLocaleString() : '';
                const direction = alert.threat_classification.threat_direction || 'unknown';

                html += `
                    <tr class="alert-row ${isSelected ? 'selected-row' : ''}" onclick="toggleAlert('${alert.alert_uuid}')">
                        <td><input type="checkbox" ${isSelected ? 'checked' : ''} onclick="event.stopPropagation(); toggleAlert('${alert.alert_uuid}')"></td>
                        <td>${escapeHtml(timestamp)}</td>
                        <td class="${severityClass}">${severity} (${alert.rule_level})</td>
                        <td>${escapeHtml(alert.rule_description || 'N/A')}</td>
                        <td>${escapeHtml(alert.src_ip || '-')}</td>
                        <td>${escapeHtml(alert.dest_ip || '-')}</td>
                        <td>${escapeHtml(direction)}</td>
                        <td>${escapeHtml(alert.agent_name || 'N/A')}</td>
                    </tr>
                `;
            });

            html += '</tbody></table></div>';
            container.innerHTML = html;
        }

        function getSeverityLevel(level) {
            if (level >= 12) return 'CRITICAL';
            if (level >= 8) return 'HIGH';
            if (level >= 5) return 'MEDIUM';
            return 'LOW';
        }

        function toggleAlert(alertUuid) {
            if (selectedAlertUuids.has(alertUuid)) {
                selectedAlertUuids.delete(alertUuid);
            } else {
                selectedAlertUuids.add(alertUuid);
            }
            updateSelectionUI();
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll').checked;
            
            if (selectAll) {
                allAlerts.forEach(alert => selectedAlertUuids.add(alert.alert_uuid));
            } else {
                selectedAlertUuids.clear();
            }
            
            updateSelectionUI();
        }

        function updateSelectionUI() {
            document.getElementById('selectedCount').textContent = selectedAlertUuids.size;
            document.getElementById('analyzeBtn').disabled = selectedAlertUuids.size === 0;
            renderAlertsTable(allAlerts);
        }

        async function analyzeSelected() {
            if (selectedAlertUuids.size === 0) {
                alert('Please select at least one alert');
                return;
            }

            const analyzeBtn = document.getElementById('analyzeBtn');
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Analyzing...';

            try {
                const response = await fetch('/analyze-selected-alerts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        selected_uuids: Array.from(selectedAlertUuids)
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }

                const data = await response.json();
                const sessionId = data.session_id;
                
                // Clear any existing interval before starting a new one.
                if (redirectCheckInterval) {
                    clearInterval(redirectCheckInterval);
                    redirectCheckInterval = null;
                }
                
                // Start polling for redirect
                let checkCount = 0;
                const maxChecks = 60; // Maximum 2 minutes (60 * 2 seconds)
                
                redirectCheckInterval = setInterval(async () => {
                    checkCount++;
                    
                    // Stop checking after max attempts
                    if (checkCount > maxChecks) {
                        clearInterval(redirectCheckInterval);
                        redirectCheckInterval = null;
                        analyzeBtn.disabled = false;
                        analyzeBtn.innerHTML = '<i class="bi bi-graph-up"></i> Analyze Selected (<span id="selectedCount">' + selectedAlertUuids.size + '</span>)';
                        alert('Analysis timeout - please check the reports page');
                        return;
                    }
                    
                    try {
                        const checkResponse = await fetch(`/api/check-analysis-result/${sessionId}`);
                        const checkResult = await checkResponse.json();
                        
                        if (checkResult.redirect && checkResult.report_id) {
                            // Clear interval before redirecting to the review editor.
                            clearInterval(redirectCheckInterval);
                            redirectCheckInterval = null;
                            window.location.href = `/review-report/${checkResult.report_id}`;
                        }
                    } catch (err) {
                        console.error('Error checking redirect:', err);
                    }
                }, 2000); // Check every 2 seconds
                
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to start analysis: ' + error.message);
                
                analyzeBtn.disabled = false;
        analyzeBtn.innerHTML = '<i class="bi bi-graph-up"></i> Analyze Selected (<span id="selectedCount">' + selectedAlertUuids.size + '</span>)';
            }
        }
        
        // Cleanup on page unload
        window.addEventListener('beforeunload', function() {
            stopAutoRefresh();
            if (redirectCheckInterval) {
                clearInterval(redirectCheckInterval);
            }
        });
        
        // Load alerts and start auto-refresh
        refreshAlerts().then(() => {
            if (autoRefreshEnabled) {
                startAutoRefresh();
            }
        }).catch(error => {
            console.error(' Failed to load initial alerts:', error);
        });
    </script>
</body>
</html>
